<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>IGCSE Computer Science Escape Room</title></head>
<body><p style="font-family:Arial,sans-serif;padding:2rem">Loading mission...</p>
<script>
const overview = `
  <section class="section panel green" id="course-overview">
    <span class="badge">What does this actually mean to me?</span>
    <h2>IGCSE Computer Science: the student version</h2>
    <p>IGCSE Computer Science is about understanding how computers work and how to solve problems with logic, algorithms and code. It is less about using software and more about thinking like a computer scientist.</p>
    <div class="grid three">
      <article class="card">
        <span class="tag">Assessment</span>
        <h3>How you are assessed</h3>
        <ul>
          <li>You will sit <strong>2 papers</strong>.</li>
          <li><strong>Paper 1</strong> focuses on <strong>computer systems and theory</strong>. This includes topics such as data representation, hardware, software, networks, security and how computer systems operate.</li>
          <li><strong>Paper 2</strong> focuses on <strong>algorithms, problem-solving and programming</strong>. You will work with pseudocode, flowcharts, trace tables, logic, test data, code and debugging.</li>
          <li>You need both theory knowledge and the ability to apply it to solve problems clearly and accurately.</li>
        </ul>
      </article>
      <article class="card">
        <span class="tag">What you will do</span>
        <h3>Learn the logic behind computing</h3>
        <ul>
          <li>Study data representation, binary and computer systems.</li>
          <li>Learn about hardware, software, networks and the internet.</li>
          <li>Design algorithms using pseudocode and flowcharts.</li>
          <li>Write, test and debug programs.</li>
          <li>Use Boolean logic, truth tables, databases and problem-solving strategies.</li>
        </ul>
      </article>
      <article class="card">
        <span class="tag">Good fit if...</span>
        <h3>You like logic and code</h3>
        <ul>
          <li>You enjoy solving puzzles and spotting patterns.</li>
          <li>You want to understand what happens inside a computer.</li>
          <li>You are willing to debug and keep trying when code breaks.</li>
          <li>You might be interested in programming, cybersecurity, AI, engineering or software development.</li>
        </ul>
      </article>
    </div>
    <p><strong>In plain English:</strong> choose Computer Science if you enjoy logic, coding and problem-solving. It is less about using software packages and more about understanding how computers work and how to program solutions.</p>
  </section>
`;
const asciiRef = `
  <section class="section panel cyan" id="ascii-reference">
    <h2>ASCII uppercase reference: A to Z</h2>
    <p>After you convert an 8-bit binary number into denary, use this table to find the matching uppercase ASCII letter.</p>
    <div class="table-wrap"><table>
      <thead><tr><th>Letter</th><th>Denary</th><th>8-bit binary</th><th>Letter</th><th>Denary</th><th>8-bit binary</th></tr></thead>
      <tbody>
        <tr><td>A</td><td>65</td><td><code>01000001</code></td><td>N</td><td>78</td><td><code>01001110</code></td></tr>
        <tr><td>B</td><td>66</td><td><code>01000010</code></td><td>O</td><td>79</td><td><code>01001111</code></td></tr>
        <tr><td>C</td><td>67</td><td><code>01000011</code></td><td>P</td><td>80</td><td><code>01010000</code></td></tr>
        <tr><td>D</td><td>68</td><td><code>01000100</code></td><td>Q</td><td>81</td><td><code>01010001</code></td></tr>
        <tr><td>E</td><td>69</td><td><code>01000101</code></td><td>R</td><td>82</td><td><code>01010010</code></td></tr>
        <tr><td>F</td><td>70</td><td><code>01000110</code></td><td>S</td><td>83</td><td><code>01010011</code></td></tr>
        <tr><td>G</td><td>71</td><td><code>01000111</code></td><td>T</td><td>84</td><td><code>01010100</code></td></tr>
        <tr><td>H</td><td>72</td><td><code>01001000</code></td><td>U</td><td>85</td><td><code>01010101</code></td></tr>
        <tr><td>I</td><td>73</td><td><code>01001001</code></td><td>V</td><td>86</td><td><code>01010110</code></td></tr>
        <tr><td>J</td><td>74</td><td><code>01001010</code></td><td>W</td><td>87</td><td><code>01010111</code></td></tr>
        <tr><td>K</td><td>75</td><td><code>01001011</code></td><td>X</td><td>88</td><td><code>01011000</code></td></tr>
        <tr><td>L</td><td>76</td><td><code>01001100</code></td><td>Y</td><td>89</td><td><code>01011001</code></td></tr>
        <tr><td>M</td><td>77</td><td><code>01001101</code></td><td>Z</td><td>90</td><td><code>01011010</code></td></tr>
      </tbody>
    </table></div>
    <p class="small"><strong>Example:</strong> <code>01000100</code> = 68, and 68 is D in ASCII.</p>
  </section>
`;
const replacements = [
  ['Teacher-led intro, 10 minutes','Mission briefing, 10 minutes'],
  ['IGCSE Computer Science teacher-led intro deck','IGCSE Computer Science mission briefing deck'],
  ['Open Canva deck','Open briefing deck'],
  ['Move to source pack','Continue to source pack'],
  ['<b>Hook</b><br>Show <code>01000001</code> and reveal that it can represent A. Computers need rules and representations.','<b>Starting clue</b><br><code>01000001</code> can represent A. Computers need rules and representations.'],
  ['<b>Mission launch</b><br>Students solve six rooms and generate an escape certificate.','<b>Mission launch</b><br>Solve six rooms and generate an escape certificate.'],
  ['<h2>Student flow</h2>','<h2>Your mission route</h2>'],
  ['<h2>Mission setup</h2>','<h2>Set up your escape team</h2>']
];
fetch('igcse-cs-escape-room.html')
  .then(r => r.text())
  .then(html => {
    for (const [from, to] of replacements) html = html.split(from).join(to);
    html = html.replace('</header>', '</header>' + overview);
    html = html.replace('<section class="section grid three"><article class="panel"><h2>Logic gate rules</h2>', asciiRef + '<section class="section grid three"><article class="panel"><h2>Logic gate rules</h2>');
    document.open(); document.write(html); document.close();
  });
</script></body></html>

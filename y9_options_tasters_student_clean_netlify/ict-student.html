<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>IGCSE ICT Control Room</title></head>
<body><p style="font-family:Arial,sans-serif;padding:2rem">Loading mission...</p>
<script>
const overview = `
  <section class="section panel blue" id="course-overview">
    <span class="badge">What does this actually mean to me?</span>
    <h2>IGCSE ICT: the student version</h2>
    <p>IGCSE ICT is about using digital tools accurately and professionally. You learn the theory behind ICT, but a major part of the course is practical: producing documents, spreadsheets, databases, presentations, images and websites to meet a task.</p>
    <div class="grid three">
      <article class="card">
        <span class="tag">Assessment</span>
        <h3>How you are assessed</h3>
        <ul>
          <li>You will sit <strong>3 papers</strong>.</li>
          <li><strong>Paper 1</strong> is the <strong>theory paper</strong>. This tests your understanding of ICT concepts such as systems, hardware, software, networks, security, safety and the impact of ICT.</li>
          <li><strong>Papers 2 and 3</strong> are <strong>practical papers</strong>. Across the practical part of the course, you may be assessed on applied ICT skills such as file management, images, document production, styles, proofing, graphs and charts, databases, presentations, spreadsheets and website authoring.</li>
          <li>Success in ICT means being both <strong>accurate</strong> and <strong>efficient</strong> when using digital tools.</li>
        </ul>
      </article>
      <article class="card">
        <span class="tag">What you will do</span>
        <h3>Use software to solve practical tasks</h3>
        <ul>
          <li>Organise files and work professionally.</li>
          <li>Create documents, layouts and presentations.</li>
          <li>Use spreadsheets, formulae, graphs and charts.</li>
          <li>Work with databases, images and web pages.</li>
          <li>Learn about systems, networks, safety, security and ICT in society.</li>
        </ul>
      </article>
      <article class="card">
        <span class="tag">Good fit if...</span>
        <h3>You like using technology well</h3>
        <ul>
          <li>You enjoy practical computer work.</li>
          <li>You like making work look clear and professional.</li>
          <li>You are careful with details.</li>
          <li>You want useful digital skills for school, work and future study.</li>
        </ul>
      </article>
    </div>
    <p><strong>In plain English:</strong> choose ICT if you want a course that mixes theory with a lot of practical computer work. It is a strong choice for students who like using software well, following instructions carefully and producing accurate digital work.</p>
  </section>
`;
const replacements = [
  ['Teacher-led intro, 10 minutes','Mission briefing, 10 minutes'],
  ['IGCSE ICT teacher-led intro deck','IGCSE ICT mission briefing deck'],
  ['Open Canva deck','Open briefing deck'],
  ['Move to source pack','Continue to source pack'],
  ['<b>Hook</b><br>Show the disaster board. Ask which problem would cause the biggest real-world issue.','<b>Starting question</b><br>Study the disaster board. Which problem would cause the biggest real-world issue?'],
  ['<b>Mission launch</b><br>Students fix five live systems, then prioritise the most urgent risks.','<b>Mission launch</b><br>Fix five live systems, then prioritise the most urgent risks.'],
  ['<h2>Student flow</h2>','<h2>Your mission route</h2>'],
  ['The event files have been dumped into one folder. Students must create a structure that someone else could understand.','The event files have been dumped into one folder. Create a structure that someone else could understand.'],
  ['<h2>Mission setup</h2>','<h2>Set up your control room</h2>']
];
fetch('igcse-ict-control-room.html')
  .then(r => r.text())
  .then(html => {
    for (const [from, to] of replacements) html = html.split(from).join(to);
    html = html.replace('</header>', '</header>' + overview);
    document.open(); document.write(html); document.close();
  });
</script></body></html>

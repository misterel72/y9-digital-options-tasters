<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>BTEC Digital Agency Sprint</title></head>
<body><p style="font-family:Arial,sans-serif;padding:2rem">Loading mission...</p>
<script>
const overview = `
  <section class="section panel teal" id="course-overview">
    <span class="badge">What does this actually mean to me?</span>
    <h2>BTEC International Level 2 IT: the student version</h2>
    <p>BTEC IT is for students who want to use technology to solve realistic problems. It is more project-based than a traditional exam-only course. You create evidence, respond to briefs, meet deadlines and explain why your choices are suitable.</p>
    <div class="grid three">
      <article class="card">
        <span class="tag">Assessment</span>
        <h3>How you are assessed</h3>
        <ul>
          <li>You will complete <strong>6 units of work</strong> across the course.</li>
          <li>In our pathway, this is counted as the <strong>equivalent of 2 IGCSEs</strong>.</li>
          <li>Assessment is built from unit evidence, assignments and practical digital work, not just one final exam.</li>
          <li>You will complete tasks, create digital products, respond to briefs and improve your work using feedback.</li>
        </ul>
      </article>
      <article class="card">
        <span class="tag">Progression</span>
        <h3>Check your future route</h3>
        <ul>
          <li>Different future study routes have different entry requirements.</li>
          <li>You should check those requirements carefully before choosing this option.</li>
          <li>This route is best for students who want an applied IT pathway or a practical qualification alongside other subjects.</li>
        </ul>
      </article>
      <article class="card">
        <span class="tag">What you will do</span>
        <h3>Build practical digital evidence</h3>
        <ul>
          <li>Use IT to communicate information clearly.</li>
          <li>Create products for realistic audiences and purposes.</li>
          <li>Use tools such as documents, presentations, spreadsheets, graphics, websites, databases or other digital products, depending on the units studied.</li>
          <li>Explain and improve your work using feedback.</li>
        </ul>
      </article>
      <article class="card">
        <span class="tag">Good fit if...</span>
        <h3>You like applied digital work</h3>
        <ul>
          <li>You enjoy making things with technology.</li>
          <li>You prefer clear tasks and practical evidence.</li>
          <li>You can work independently and meet deadlines.</li>
          <li>You are willing to explain your decisions, not just make something look good.</li>
        </ul>
      </article>
    </div>
    <p><strong>In plain English:</strong> choose BTEC IT if you want a practical, applied route where your portfolio shows what you can actually produce with technology. Check your future study requirements carefully before choosing this course.</p>
  </section>
`;
const replacements = [
  ['Teacher-led intro, 10 minutes','Mission briefing, 10 minutes'],
  ['Embedded Canva teacher presentation','Embedded mission briefing presentation'],
  ['BTEC L2 ICT teacher-led intro deck','BTEC L2 IT mission briefing deck'],
  ['Open Canva deck','Open briefing deck'],
  ['Move to source pack','Continue to source pack'],
  ['<b>Hook</b><br>Ask: what makes a digital product trustworthy, exciting and useful?','<b>Starting question</b><br>What makes a digital product trustworthy, exciting and useful?'],
  ['<b>BTEC mindset</b><br>Explain that BTEC IT is applied. Students respond to a brief, make decisions and justify their choices.','<b>BTEC mindset</b><br>BTEC IT is applied. You respond to a brief, make decisions and justify your choices.'],
  ['<b>Agency sprint</b><br>Students work as a digital agency hired by the FutureFest events team.','<b>Agency sprint</b><br>Work as a digital agency hired by the FutureFest events team.'],
  ['<h2>Student flow</h2>','<h2>Your mission route</h2>'],
  ['Suggested grouping: pairs or threes. Students should use first names only if entering team details.','Work in pairs or threes. Use first names only if entering team details.'],
  ['<h2>Mission setup</h2>','<h2>Set up your agency</h2>'],
  ['<h3>Features students can mention</h3>','<h3>Features you can mention</h3>']
];
fetch('btec-digital-agency.html')
  .then(r => r.text())
  .then(html => {
    for (const [from, to] of replacements) html = html.split(from).join(to);
    html = html.replace('</header>', '</header>' + overview);
    document.open(); document.write(html); document.close();
  });
</script></body></html>
